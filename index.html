<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Timer</title>

  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Background Overlay -->
  <div class="overlay"></div>

  <!-- Konten Utama -->
  <div class="container">
    <h1 id="title">STUDY WITH AS</h1>

    <!-- Mode Buttons -->
    <div id="modeButtons">
      <button class="mode-btn active" onclick="setMode('pomodoro')">Pomodoro</button>
      <button class="mode-btn" onclick="setMode('short')">Short Break</button>
      <button class="mode-btn" onclick="setMode('long')">Long Break</button>
    </div>

    <!-- Timer -->
    <div id="timerDisplay">25:00</div>

    <!-- Kontrol Tombol -->
    <div id="controlButtons">
      <button id="startBtn" class="control-btn" onclick="startTimer()">Start</button>
      <button class="icon-btn" onclick="resetTimer()">🔁</button>
      <button class="icon-btn"
        style="width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
          <defs>
            <!-- Subtle Warm Amber Glow (10% Opacity) -->
            <filter id="amberGlow" x="-30%" y="-30%" width="160%" height="160%">
              <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FFC857" flood-opacity="0.1" />
            </filter>

            <!-- Primary Gradient: Warm Sunset Gold to Orange -->
            <linearGradient id="sunsetGrad" x1="15%" y1="0%" x2="85%" y2="100%">
              <stop offset="0%" stop-color="#F6B73C" />
              <stop offset="100%" stop-color="#FF8C42" />
            </linearGradient>
          </defs>

          <!-- Outer Gear with Glow, Outline, and Gradient Fill -->
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z M12 8a4 4 0 1 0 0 8 4 4 0 1 0 0-8z"
            fill="url(#sunsetGrad)" stroke="#0F3D3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            fill-rule="evenodd" filter="url(#amberGlow)" />

          <!-- Center Soft Turquoise Highlight Focus Point -->
          <circle cx="12" cy="12" r="1.5" fill="#2EC4C7" />
        </svg>
      </button>
    </div>

    <!-- Musik Player -->
    <div class="music-box">
      <button onclick="toggleMusic()" class="control-btn">🎵 Play Musik</button>
      <p id="musicStatus" style="margin-top: 8px; font-size: 0.85rem;">Musik: OFF</p>
    </div>
  </div>

  <!-- Nada dering otomatis -->
  <audio id="alarmSound" src="ding.mp3" preload="auto"></audio>

  <!-- Musik manual -->
  <audio id="bgMusic" src="lofi.mp3" loop></audio>

  <!-- Custom Script -->
  <script src="script.js"></script>
</body>

</html>
